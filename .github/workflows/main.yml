name: Final Build and SHA1
on: push

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and Sync Capacitor
        run: |
          npm install
          npm run build
          # الخطوة دي هي اللي بتكريت الفولدر اللي كان ناقص
          npx cap sync android 

      - name: Get SHA1 Report
        run: |
          cd android
          chmod +x gradlew
          ./gradlew signingReport > ../report.txt

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload SHA1 and APK
        uses: actions/upload-artifact@v4
        with:
          name: project-outputs
          path: |
            report.txt
            android/app/build/outputs/apk/debug/app-debug.apk