name: Build APK
on: push

# إضافة الصلاحيات اللازمة للسيرفر
permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # استخدام نسخة Node مستقرة
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      # تنظيف الملفات القديمة وإجبار السيرفر على تحميل النسخ المتوافقة مع Linux
      - name: Clean and Install Dependencies
        run: |
          rm -rf package-lock.json node_modules
          npm install --platform=linux --arch=x64
          
      - run: npm run build
      - run: npx cap sync
      
      # بناء ملف الأندرويد
      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      # رفع الملف النهائي باستخدام النسخة الجديدة v4
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/debug/app-debug.apk