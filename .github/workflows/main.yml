name: Get SHA1 Report
on: push
jobs:
  get-sha1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Extract SHA1
        run: |
          cd android
          chmod +x gradlew
          ./gradlew signingReport > ../report.txt
          
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: my-sha1-report
          path: report.txt